plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	// Add repositories to retrieve artifacts from in here.
	// You should only use this when depending on other mods because
	// Loom adds the essential maven repositories to download Minecraft and libraries from automatically.
	// See https://docs.gradle.org/current/userguide/declaring_repositories.html
	// for more information about repositories.
	maven {
		url = uri("https://maven.dimaskama.net/releases")
	}
}

loom {
	splitEnvironmentSourceSets()
	mods {
		"computerpc" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Depend only on the Fabric modules this mod actually uses.
	implementation "net.fabricmc.fabric-api:fabric-creative-tab-api-v1:5.0.9+d871b99e6b"
	implementation "net.fabricmc.fabric-api:fabric-events-interaction-v0:5.1.8+c82f04616b"
	implementation "net.fabricmc.fabric-api:fabric-lifecycle-events-v1:4.0.4+c82f04616b"
	implementation "net.fabricmc.fabric-api:fabric-networking-api-v1:6.2.3+d871b99e6b"
	implementation "net.fabricmc.fabric-api:fabric-object-builder-api-v1:23.0.11+b61fef436b"
	implementation "net.fabricmc.fabric-api:fabric-rendering-v1:23.0.0+d871b99e6b"
	runtimeOnly "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
	implementation "me.friwi:jcef-api:jcef-cffac27+cef-143.0.14+gdd46a37+chromium-143.0.7499.193"
	implementation "me.friwi:jcefmaven:143.0.14"
	implementation "org.apache.commons:commons-compress:1.27.1"
	include "me.friwi:jcef-api:jcef-cffac27+cef-143.0.14+gdd46a37+chromium-143.0.7499.193"
	include "me.friwi:jcefmaven:143.0.14"
	include "org.apache.commons:commons-compress:1.27.1"
	
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.encoding = "UTF-8"
	it.options.release = 25
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}

	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	inputs.property "archivesName", project.base.archivesName
	manifest {
		attributes(
			'Implementation-Title': project.base.archivesName,
			'Implementation-Version': project.version
		)
	}

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}
